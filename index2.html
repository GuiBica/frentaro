<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasaPT – Arrendamentos em Portugal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #1D5C4A; --brand-light: #E1F5EE; --brand-mid: #0F6E56;
      --accent: #D85A30; --text: #1a1a1a; --muted: #6b7280;
      --bg: #ffffff; --surface: #f9fafb; --border: #e5e7eb;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); background: var(--surface); }
    .nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:10; }
    .logo { display:flex; align-items:center; gap:8px; font-size:20px; font-weight:600; color:var(--brand); cursor:pointer; text-decoration:none; }
    .logo em { font-style:normal; color:var(--accent); }
    .nav-actions { display:flex; gap:8px; }
    .btn { padding:8px 16px; border-radius:var(--radius); font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; border:1px solid var(--border); background:transparent; color:var(--text); transition:background 0.15s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn:hover { background:var(--surface); }
    .btn-primary { background:var(--brand); color:#fff; border-color:var(--brand); }
    .btn-primary:hover { background:var(--brand-mid); }
    .btn-sm { padding:6px 12px; font-size:13px; }
    .page { display:none; }
    .page.active { display:block; }
    .hero { background:var(--brand-light); padding:56px 24px 48px; text-align:center; }
    .hero h1 { font-size:36px; font-weight:700; color:var(--brand); margin-bottom:10px; }
    .hero p { font-size:17px; color:var(--muted); margin-bottom:28px; }
    .search-bar { display:flex; gap:8px; max-width:580px; margin:0 auto; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:8px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .search-bar input { flex:1; border:none; background:transparent; font-size:15px; color:var(--text); outline:none; padding:4px 8px; }
    .search-bar select { border:none; background:transparent; font-size:14px; color:var(--muted); outline:none; cursor:pointer; padding:4px; }
    .search-bar button { background:var(--brand); color:#fff; border:none; border-radius:var(--radius); padding:8px 16px; cursor:pointer; font-size:14px; font-weight:500; }
    .filters { display:flex; gap:8px; padding:16px 24px; overflow-x:auto; border-bottom:1px solid var(--border); background:var(--bg); }
    .filter-chip { padding:7px 16px; border-radius:20px; font-size:13px; font-weight:500; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
    .filter-chip.active, .filter-chip:hover { background:var(--brand-light); color:var(--brand); border-color:var(--brand); }
    .stats-bar { display:flex; gap:24px; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); font-size:13px; color:var(--muted); }
    .stats-bar strong { color:var(--text); }
    .listings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; padding:24px; max-width:1200px; margin:0 auto; }
    .listing-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition:box-shadow 0.2s, border-color 0.2s; cursor:pointer; }
    .listing-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.1); border-color:var(--brand); }
    .card-img { height:180px; background:var(--brand-light); display:flex; align-items:center; justify-content:center; color:var(--brand); font-size:48px; }
    .card-body { padding:18px; }
    .card-price { font-size:22px; font-weight:700; color:var(--brand); margin-bottom:4px; }
    .card-price span { font-size:13px; font-weight:400; color:var(--muted); }
    .card-title { font-size:15px; font-weight:600; margin-bottom:8px; line-height:1.4; }
    .card-location { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:4px; margin-bottom:14px; }
    .card-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .tag { padding:4px 10px; border-radius:20px; font-size:12px; background:var(--surface); color:var(--muted); border:1px solid var(--border); }
    .tag.green { background:#E1F5EE; color:#0F6E56; border-color:#9FE1CB; }
    .empty-state { text-align:center; padding:80px 24px; color:var(--muted); }
    .empty-state i { font-size:56px; display:block; margin-bottom:16px; color:#d1d5db; }
    .empty-state h3 { font-size:20px; font-weight:600; color:var(--text); margin-bottom:8px; }
    .empty-state p { margin-bottom:24px; }
    .loading-state { text-align:center; padding:80px; color:var(--muted); font-size:16px; }
    .form-page { max-width:700px; margin:0 auto; padding:40px 24px; }
    .form-page h2 { font-size:24px; font-weight:700; margin-bottom:6px; }
    .form-page .subtitle { font-size:15px; color:var(--muted); margin-bottom:36px; }
    .form-section { margin-bottom:32px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; }
    .section-title { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .form-row.single { grid-template-columns:1fr; }
    .form-row.triple { grid-template-columns:1fr 1fr 1fr; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:13px; font-weight:500; color:var(--muted); }
    .form-group input, .form-group select, .form-group textarea { padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; transition:border-color 0.15s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--brand); }
    .form-group textarea { resize:vertical; min-height:90px; }
    .toggle-row { display:flex; gap:20px; flex-wrap:wrap; margin-top:4px; }
    .toggle-item { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; color:var(--text); }
    .toggle-item input[type="checkbox"] { width:16px; height:16px; accent-color:var(--brand); cursor:pointer; }
    .form-actions { display:flex; gap:12px; justify-content:flex-end; padding-top:8px; }
    .toast { position:fixed; bottom:28px; right:28px; background:var(--brand); color:#fff; padding:14px 22px; border-radius:var(--radius); font-size:14px; font-weight:500; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:1000; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
    .toast.show { opacity:1; }
    .toast.error { background:#993C1D; }
    @media(max-width:600px) {
      .form-row, .form-row.triple { grid-template-columns:1fr; }
      .hero h1 { font-size:26px; }
      .listings-grid { grid-template-columns:1fr; }
      .nav-actions .btn-sm:first-child { display:none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="logo" onclick="showPage('listings')">
    <i class="ti ti-building" aria-hidden="true"></i>
    casa<em>pt</em>
  </a>
  <div class="nav-actions">
    <button class="btn btn-sm" onclick="showPage('listings')"><i class="ti ti-search"></i> Anúncios</button>
    <button class="btn btn-sm btn-primary" onclick="showPage('post')"><i class="ti ti-plus"></i> Anunciar imóvel</button>
  </div>
</nav>

<div id="page-listings" class="page active">
  <div class="hero">
    <h1>Encontre a sua casa em Portugal</h1>
    <p>Arrendamentos verificados por todo o país</p>
    <div class="search-bar">
      <i class="ti ti-search" style="font-size:18px;color:#9ca3af;align-self:center;padding-left:4px"></i>
      <input type="text" id="search-input" placeholder="Cidade, zona ou tipo de imóvel..." oninput="filterListings()">
      <select id="type-filter" onchange="filterListings()">
        <option value="">Todos os tipos</option>
        <option value="apartment">Apartamento</option>
        <option value="house">Moradia</option>
        <option value="studio">Estúdio</option>
        <option value="room">Quarto</option>
      </select>
      <button onclick="filterListings()">Pesquisar</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-chip active" onclick="setFilter(this,'')">Todos</button>
    <button class="filter-chip" onclick="setFilter(this,'Lisboa')">Lisboa</button>
    <button class="filter-chip" onclick="setFilter(this,'Porto')">Porto</button>
    <button class="filter-chip" onclick="setFilter(this,'Braga')">Braga</button>
    <button class="filter-chip" onclick="setFilter(this,'Cascais')">Cascais</button>
    <button class="filter-chip" onclick="setFilter(this,'Coimbra')">Coimbra</button>
    <button class="filter-chip" onclick="setFilter(this,'Almada')">Almada</button>
  </div>

  <div class="stats-bar" id="stats-bar"><span>A carregar anúncios...</span></div>
  <div id="listings-container"><div class="loading-state"><i class="ti ti-loader-2" style="font-size:32px;display:block;margin-bottom:12px"></i>A carregar anúncios...</div></div>
</div>

<div id="page-post" class="page">
  <div class="form-page">
    <h2>Publicar imóvel para arrendar</h2>
    <p class="subtitle">Preencha os detalhes do seu imóvel. O anúncio fica visível imediatamente.</p>

    <div class="form-section">
      <div class="section-title">Informação do imóvel</div>
      <div class="form-row single"><div class="form-group"><label>Título do anúncio *</label><input type="text" id="f-title" placeholder="Ex: T2 Renovado com Terraço – Príncipe Real"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Tipo de imóvel *</label>
          <select id="f-type">
            <option value="">Selecionar...</option>
            <option value="apartment">Apartamento</option>
            <option value="house">Moradia</option>
            <option value="studio">Estúdio</option>
            <option value="room">Quarto</option>
            <option value="commercial">Comercial</option>
          </select>
        </div>
        <div class="form-group"><label>Tipologia</label><input type="text" id="f-typology" placeholder="Ex: T2, T3, Quarto..."></div>
      </div>
      <div class="form-row triple">
        <div class="form-group"><label>Quartos</label>
          <select id="f-bedrooms">
            <option value="0">T0 / Estúdio</option>
            <option value="1">1 – T1</option>
            <option value="2">2 – T2</option>
            <option value="3">3 – T3</option>
            <option value="4">4+ – T4+</option>
          </select>
        </div>
        <div class="form-group"><label>Casas de banho</label>
          <select id="f-bathrooms"><option value="1">1</option><option value="2">2</option><option value="3">3+</option></select>
        </div>
        <div class="form-group"><label>Área (m²)</label><input type="number" id="f-area" placeholder="Ex: 85"></div>
      </div>
      <div class="form-row single"><div class="form-group"><label>Descrição</label><textarea id="f-desc" placeholder="Descreva o imóvel: características, transportes próximos, condições..."></textarea></div></div>
      <div class="toggle-row">
        <label class="toggle-item"><input type="checkbox" id="f-furnished"> Mobilado</label>
        <label class="toggle-item"><input type="checkbox" id="f-pets"> Animais permitidos</label>
        <label class="toggle-item"><input type="checkbox" id="f-parking"> Estacionamento</label>
        <label class="toggle-item"><input type="checkbox" id="f-elevator"> Elevador</label>
        <label class="toggle-item"><input type="checkbox" id="f-balcony"> Varanda</label>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Localização</div>
      <div class="form-row single"><div class="form-group"><label>Morada *</label><input type="text" id="f-address" placeholder="Rua, número, andar"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Cidade *</label><input type="text" id="f-city" placeholder="Ex: Lisboa"></div>
        <div class="form-group"><label>Código postal</label><input type="text" id="f-postal" placeholder="Ex: 1200-110"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Preço e disponibilidade</div>
      <div class="form-row">
        <div class="form-group"><label>Renda mensal (€) *</label><input type="number" id="f-price" placeholder="Ex: 950"></div>
        <div class="form-group"><label>Disponível a partir de</label><input type="date" id="f-available"></div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" onclick="showPage('listings')">Cancelar</button>
      <button class="btn btn-primary" onclick="submitListing()"><i class="ti ti-send"></i> Publicar anúncio</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SB_URL = "https://whhpnryzoujwboocsdkm.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoaHBucnl6b3Vqd2Jvb2NzZGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODg2NDksImV4cCI6MjA4ODA2NDY0OX0.o_65NQG5NtKI9cMlR_NAE0Pn41kH6lrXNL95cbxq6GM";
  const HEADERS = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY };

  const PT = { apartment:"Apartamento", house:"Moradia", studio:"Estúdio", room:"Quarto", commercial:"Comercial" };
  const ICO = { apartment:"ti-building", house:"ti-home", studio:"ti-door", room:"ti-bed", commercial:"ti-building-store" };

  let all = [], cityFilter = "";

  async function fetchListings() {
    try {
      const r = await fetch(SB_URL + "/rest/v1/listings?order=created_at.desc", { headers: HEADERS });
      all = await r.json();
      if (!Array.isArray(all)) all = [];
      renderListings(all);
    } catch(e) {
      document.getElementById("listings-container").innerHTML = '<div class="empty-state"><i class="ti ti-wifi-off"></i><h3>Erro ao carregar</h3><p>Não foi possível ligar à base de dados.</p></div>';
    }
  }

  function renderListings(list) {
    document.getElementById("stats-bar").innerHTML = "<span><strong>" + list.length + "</strong> anúncio" + (list.length!==1?"s":"") + " encontrado" + (list.length!==1?"s":"") + "</span>";
    const c = document.getElementById("listings-container");
    if (!list.length) {
      c.innerHTML = '<div class="empty-state"><i class="ti ti-home-off"></i><h3>Nenhum anúncio encontrado</h3><p>Seja o primeiro a publicar nesta zona.</p><br><button class="btn btn-primary" onclick="showPage(\'post\')">Publicar imóvel</button></div>';
      return;
    }
    c.innerHTML = '<div class="listings-grid">' + list.map(cardHTML).join("") + '</div>';
  }

  function cardHTML(l) {
    const icon = ICO[l.property_type] || "ti-home";
    const label = l.typology || PT[l.property_type] || "";
    const price = Number(l.price).toLocaleString("pt-PT");
    const beds = l.bedrooms > 0 ? l.bedrooms + " quarto" + (l.bedrooms>1?"s":"") : "T0";
    const area = l.area ? l.area + "m²" : "";
    const extras = [l.furnished?"Mobilado":"", l.pets_allowed?"Animais OK":"", l.parking?"Garagem":""].filter(Boolean);
    const baseTags = [label, beds, area].filter(Boolean);
    return '<div class="listing-card"><div class="card-img"><i class="ti ' + icon + '"></i></div><div class="card-body"><div class="card-price">€' + price + '<span> / mês</span></div><div class="card-title">' + esc(l.title) + '</div><div class="card-location"><i class="ti ti-map-pin"></i>' + esc(l.city||"") + (l.postal_code ? " · " + esc(l.postal_code) : "") + '</div><div class="card-tags">' + baseTags.map(t=>'<span class="tag">'+t+'</span>').join("") + extras.map(t=>'<span class="tag green">'+t+'</span>').join("") + '</div></div></div>';
  }

  function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function filterListings() {
    const q = document.getElementById("search-input").value.toLowerCase();
    const type = document.getElementById("type-filter").value;
    renderListings(all.filter(function(l){
      const mQ = !q || [l.city,l.title,l.address,l.typology].some(function(v){return v&&v.toLowerCase().includes(q);});
      const mT = !type || l.property_type===type;
      const mC = !cityFilter || (l.city&&l.city.toLowerCase().includes(cityFilter.toLowerCase()));
      return mQ && mT && mC;
    }));
  }

  function setFilter(el, city) {
    cityFilter = city;
    document.querySelectorAll(".filter-chip").forEach(function(c){c.classList.remove("active");});
    el.classList.add("active");
    filterListings();
  }

  function showPage(name) {
    document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
    document.getElementById("page-"+name).classList.add("active");
    if(name==="listings") fetchListings();
    window.scrollTo(0,0);
  }

  function showToast(msg, err) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (err?" error":"");
    setTimeout(function(){t.classList.remove("show");}, 3500);
  }

  async function submitListing() {
    const g = function(id){ return document.getElementById(id).value.trim(); };
    const req = {"f-title":"Título","f-type":"Tipo de imóvel","f-address":"Morada","f-city":"Cidade","f-price":"Renda"};
    for(const id in req) {
      if(!g(id)){ showToast("Por favor preencha: " + req[id], true); document.getElementById(id).focus(); return; }
    }
    const body = {
      title:g("f-title"), description:g("f-desc")||null, price:parseFloat(g("f-price")),
      property_type:g("f-type"), typology:g("f-typology")||null,
      bedrooms:parseInt(g("f-bedrooms")), bathrooms:parseInt(g("f-bathrooms")),
      area:g("f-area")?parseFloat(g("f-area")):null,
      address:g("f-address"), city:g("f-city"), postal_code:g("f-postal")||null,
      available_from:document.getElementById("f-available").value||null,
      furnished:document.getElementById("f-furnished").checked,
      pets_allowed:document.getElementById("f-pets").checked,
      parking:document.getElementById("f-parking").checked,
      elevator:document.getElementById("f-elevator").checked,
      balcony:document.getElementById("f-balcony").checked
    };
    try {
      const r = await fetch(SB_URL + "/rest/v1/listings", {
        method:"POST",
        headers:Object.assign({}, HEADERS, {"Content-Type":"application/json","Prefer":"return=representation"}),
        body:JSON.stringify(body)
      });
      if(r.ok){ showToast("✓ Anúncio publicado com sucesso!"); setTimeout(function(){showPage("listings");}, 1200); }
      else { showToast("Erro ao publicar. Tente novamente.", true); }
    } catch(e){ showToast("Erro de ligação. Tente novamente.", true); }
  }

  fetchListings();
</script>
</body>
</html>
